<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FBNeo WASM — NEOGEO Demo</title>
    <link rel="icon" href="data:," />

    <!-- Base theme from the engine-specs demo template, then our NEOGEO skin.
         fbneo.css is loaded last so its :root token overrides win. -->
    <link rel="stylesheet" href="./demo.css" />
    <link rel="stylesheet" href="./fbneo.css" />
  </head>
  <body>
    <main></main>

    <!-- Hand the FBNeo SDK to the template shell (sdk.js picks up window.SDK),
         then boot the shared demo.js. Order matters: SDK must exist before
         demo.js runs its top-level getSdk(). -->
    <script type="module">
      import sdk from "./fbneo/fbneo.sdk.js";
      import { RomsetIndex, resolveDriver } from "./fbneo/romset.js";

      // Content-based ROM-set identification: a picked file may be named
      // `mslug (1).zip` (browser-mangled), but FBNeo needs the driver short name
      // `mslug`. Rather than trust the filename, recover the driver from the
      // CRC-32s inside the zip. This NEOGEO demo lazy-loads the Neo Geo dataset;
      // if the dropped set is identified, we override `options.driver`, otherwise
      // we leave the SDK's filename inference untouched. See the `romset` export.
      let indexPromise = null;
      const getIndex = () =>
        (indexPromise ??= fetch("./romsets/neogeo.json")
          .then((r) => r.json())
          .then((sys) => new RomsetIndex([sys])));

      const toBytes = (rom) =>
        rom instanceof Uint8Array
          ? rom
          : rom instanceof ArrayBuffer
            ? new Uint8Array(rom)
            : ArrayBuffer.isView(rom)
              ? new Uint8Array(rom.buffer, rom.byteOffset, rom.byteLength)
              : null;

      // Hand the shell a thin wrapper whose load() resolves the driver by content
      // first. demo.js is untouched — it just sees a normal SDK.
      window.SDK = {
        ...sdk,
        async load(config) {
          const bytes = toBytes(config?.assets?.rom);
          if (bytes) {
            try {
              const match = resolveDriver(bytes, await getIndex());
              if (match) {
                console.log(
                  `[fbneo] identified by content: ${match.driver} ` +
                    `(${match.system}, ${match.matched}/${match.total} ROMs) — ` +
                    `overriding filename-derived driver`,
                );
                config = { ...config, options: { ...config.options, driver: match.driver } };
              } else {
                console.log("[fbneo] no content match; using filename-derived driver");
              }
            } catch (err) {
              console.warn("[fbneo] content identification skipped:", err);
            }
          }
          return sdk.load(config);
        },
      };

      // The template renders a "file-info" panel (name/size/checksums) as an
      // overlay on the running game. fbneo.css hides that overlay; here we
      // mirror its contents to the console once the async checksums resolve.
      // demo.js is left untouched so it keeps tracking the engine-specs template.
      const seen = new WeakSet();
      const logFileInfo = (host) => {
        const root = host.shadowRoot;
        if (!root || seen.has(host)) return;
        const rows = [...root.querySelectorAll(".row")].map((r) => [
          r.querySelector("dt")?.textContent?.trim(),
          r.querySelector("dd")?.textContent?.trim(),
        ]);
        if (!rows.length || rows.some(([, v]) => /computing/i.test(v || ""))) return;
        seen.add(host);
        const name = root.querySelector("h2")?.textContent?.trim();
        console.log(`[fbneo] file info — ${name}`);
        console.table(Object.fromEntries(rows));
      };
      new MutationObserver(() => {
        document.querySelectorAll("section.file-info").forEach((host) => {
          if (host.shadowRoot && !host.__logObs) {
            host.__logObs = new MutationObserver(() => logFileInfo(host));
            host.__logObs.observe(host.shadowRoot, {
              childList: true,
              subtree: true,
              characterData: true,
            });
            logFileInfo(host);
          }
        });
      }).observe(document.body, { childList: true, subtree: true });

      // NeoGeo (and most FBNeo arcade sets) can't boot without their system
      // BIOS, so require it. `?bios=required` is the template's own knob, read
      // from demo.js's import.meta.url — no fork needed.
      await import("./demo.js?bios=required");
    </script>
  </body>
</html>
