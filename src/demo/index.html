<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FBNeo WASM — NEOGEO Demo</title>
    <link rel="icon" href="data:," />

    <!-- Base theme from the engine-specs demo template, then our NEOGEO skin.
         fbneo.css is loaded last so its :root token overrides win. -->
    <link rel="stylesheet" href="./demo.css" />
    <link rel="stylesheet" href="./fbneo.css" />

    <!-- The vendored demo.js imports jq79 from a hard-coded CDN URL. Under the
         preview server's COEP: require-corp, a cross-origin module import from
         GitHub Pages (no CORP header) is blocked, so remap it to a local copy. -->
    <script type="importmap">
      {
        "imports": {
          "https://jgermade.github.io/jq79/jq79.js": "./vendor/jq79.js"
        }
      }
    </script>
  </head>
  <body>
    <main></main>

    <!-- Hand the FBNeo SDK to the template shell (sdk.js picks up window.SDK),
         then boot the shared demo.js. Order matters: SDK must exist before
         demo.js runs its top-level getSdk(). -->
    <script type="module">
      import sdk from "./fbneo/fbneo.sdk.js";
      window.SDK = sdk;

      // The template renders a "file-info" panel (name/size/checksums) as an
      // overlay on the running game. fbneo.css hides that overlay; here we
      // mirror its contents to the console once the async checksums resolve.
      // demo.js is left untouched so it keeps tracking the engine-specs template.
      const seen = new WeakSet();
      const logFileInfo = (host) => {
        const root = host.shadowRoot;
        if (!root || seen.has(host)) return;
        const rows = [...root.querySelectorAll(".row")].map((r) => [
          r.querySelector("dt")?.textContent?.trim(),
          r.querySelector("dd")?.textContent?.trim(),
        ]);
        if (!rows.length || rows.some(([, v]) => /computing/i.test(v || ""))) return;
        seen.add(host);
        const name = root.querySelector("h2")?.textContent?.trim();
        console.log(`[fbneo] file info — ${name}`);
        console.table(Object.fromEntries(rows));
      };
      new MutationObserver(() => {
        document.querySelectorAll("section.file-info").forEach((host) => {
          if (host.shadowRoot && !host.__logObs) {
            host.__logObs = new MutationObserver(() => logFileInfo(host));
            host.__logObs.observe(host.shadowRoot, {
              childList: true,
              subtree: true,
              characterData: true,
            });
            logFileInfo(host);
          }
        });
      }).observe(document.body, { childList: true, subtree: true });

      // NeoGeo (and most FBNeo arcade sets) can't boot without their system
      // BIOS, so require it. `?bios=required` is the template's own knob, read
      // from demo.js's import.meta.url — no fork needed.
      await import("./demo.js?bios=required");
    </script>
  </body>
</html>
